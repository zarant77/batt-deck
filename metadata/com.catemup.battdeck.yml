Name: BattDeck
Summary: Offline battery pack manager
Description: |-
  BattDeck is an offline Android app for managing battery packs.

  It helps track battery pack names, markings, voltage levels, estimated charge percentage,
  active battery status, and usage order.

  Features:
  - battery pack list
  - voltage input
  - automatic charge percentage calculation
  - active battery marker
  - configurable minimum and maximum voltage
  - editable battery markings
  - JSON import and export
  - local-only data storage

  BattDeck does not require accounts, internet access, cloud sync, analytics, ads, or remote servers.

